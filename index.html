<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limb Darkening Math | UE 5.7 Procedural Demo</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Floating & Collapsible UI */
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            width: 280px; background: rgba(10, 10, 10, 0.9);
            padding: 0; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 100; border: 1px solid #333;
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        #ui-panel.minimized { transform: translateX(-300px); opacity: 0; pointer-events: none; }
        
        .ui-header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .ui-header h2 { margin: 0; font-size: 14px; color: #ffaa00; text-transform: uppercase; letter-spacing: 1px; }
        
        #ui-toggle-btn {
            position: absolute; top: 20px; left: 20px;
            width: 40px; height: 40px; background: #ffaa00;
            border: none; border-radius: 8px; cursor: pointer;
            z-index: 101; display: none; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(255,170,0,0.3);
        }
        #ui-toggle-btn.visible { display: flex; }

        .close-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 18px; }
        .close-btn:hover { color: #fff; }

        .ui-content { padding: 20px; }
        
        .control-group { margin-bottom: 15px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        .control-group label span.value { color: #ffaa00; font-family: monospace; font-size: 13px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ffaa00; margin: 0; }

        .footer { padding: 10px 20px; font-size: 10px; color: #444; text-align: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <button id="ui-toggle-btn" onclick="toggleUI()">⚙️</button>

    <div id="ui-panel">
        <div class="ui-header">
            <h2>Limb Darkening</h2>
            <button class="close-btn" onclick="toggleUI()">×</button>
        </div>
        <div class="ui-content">
            
            <p style="font-size: 12px; color: #999; margin: 0 0 15px 0;">Visualizing Claret 2000 4-term darkening model on a full-screen flat quad.</p>

            <div class="control-group">
                <label>Corona Intensity <span id="val-coronaInt" class="value">0.40</span></label>
                <input type="range" id="coronaInt" min="0.0" max="1.0" step="0.01" value="0.40">
            </div>

        </div>
        <div class="footer">UE 5.7 Procedural Demo • STEP 3 • by pavelzosim.com</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- GLOBAL VARIABLES ---
        let scene, camera, renderer, mesh, material;
        const startTime = Date.now();

        // UI Toggle Logic
        function toggleUI() {
            const panel = document.getElementById('ui-panel');
            const btn = document.getElementById('ui-toggle-btn');
            panel.classList.toggle('minimized');
            btn.classList.toggle('visible');
        }

        // --- SHADERS (GLSL) ---
        const _VS = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const _FS = `
            precision highp float;
            uniform float coronaInt;
            varying vec2 vUv;

            // Claret 2000 (4-term accurate model, Teff=5778K)
            // mu = 1.0 at center, 0.0 at limb
            float limbClaret(float mu) {
                float sqmu = sqrt(max(mu, 0.0));
                return clamp(1.0 
                    - 0.4361 * (1.0 - sqmu) 
                    - 0.2860 * (1.0 - mu) 
                    - 0.1567 * (1.0 - mu * sqmu) 
                    + 0.0885 * (1.0 - mu * mu), 
                    0.0, 1.0);
            }

            void main() {
                // Adjust UV to center the disk and make it perfectly round
                vec2 p = (vUv - 0.5) * 2.0;
                
                // Crop to circle
                float d = length(p);
                if (d > 1.0) { discard; }

                // mu = sqrt(1.0 - r^2) - this projects 2D distance to 3D cos theta
                float mu = sqrt(1.0 - d * d);

                // STEP 1: Calculate Limb Darkening Multiplier (Claret Model)
                float limbMult = limbClaret(mu);

                // STEP 2: Base Star Color (Orange/Yellow)
                vec3 baseColor = vec3(1.0, 0.6, 0.1);

                // STEP 3: Apply darkening
                vec3 finalColor = baseColor * limbMult;

                // STEP 4: Add Additive Corona Rim Glow (at mu close to 0)
                float corona = pow(1.0 - mu, 8.0) * coronaInt;
                finalColor += vec3(1.0, 0.8, 0.4) * corona;

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // --- APP INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.Camera(); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.PlaneBufferGeometry(2, 2);
            
            material = new THREE.ShaderMaterial({
                uniforms: {
                    coronaInt: { value: 0.40 }
                },
                vertexShader: _VS,
                fragmentShader: _FS
            });

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize, false);
            setupUI();
            animate();
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function setupUI() {
            const el = document.getElementById('coronaInt');
            const display = document.getElementById('val-coronaInt');
            el.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                display.innerText = val.toFixed(2);
                material.uniforms.coronaInt.value = val;
            });
        }

        init();
    </script>
</body>
</html>
