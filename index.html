<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limb Darkening Math | UE 5.7 Procedural Demo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/pavelzosim/atlas-framework@1b94ccf8eceef058d93848d15ee6551dc61bdf26/cdn/atlas-framework.css">
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #050505; 
        }

        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .atlas-ui-wrapper {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 100;
            width: 340px;
            pointer-events: none;
        }

        .atlas-shader-panel {
            pointer-events: auto;
        }

        /* Интеграция логики схлопывания для Atlas Panel */
        .atlas-shader-panel__header {
            cursor: pointer;
            user-select: none;
        }

        .atlas-shader-panel.is-collapsed .atlas-shader-panel__body,
        .atlas-shader-panel.is-collapsed .atlas-shader-panel__footer {
            display: none !important;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="atlas-container atlas-ui-wrapper">
        <div class="atlas-shader-panel" id="ui-panel">
            
            <div class="atlas-shader-panel__header" id="ui-header" title="Click to expand">
                <div class="atlas-shader-panel__title">Limb Darkening</div>
                <div class="atlas-shader-panel__status">
                    <div class="atlas-shader-panel__led"></div>
                    ACTIVE
                </div>
            </div>

            <div class="atlas-shader-panel__body">
                <div class="atlas-shader-panel__block">
                    <div class="atlas-shader-panel__block-title">
                        Claret 2000 Model
                        <span class="atlas-shader-panel__block-hint">MATH</span>
                    </div>
                    
                    <p style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #888; margin: 0 0 15px 0; line-height: 1.4;">
                        Visualizing 4-term accurate darkening model (Teff=5778K) on a full-screen flat quad.
                    </p>

                    <div class="atlas-sp-grid">
                        
                        <div class="atlas-sp-prefix">val_</div>
                        <div class="atlas-sp-label">CoronaIntensity</div>
                        <div class="atlas-sp-value" id="val-coronaInt">0.40</div>
                        <div class="atlas-sp-slider-wrap atlas-sp-row-full">
                            <input type="range" class="atlas-sp-slider" id="coronaInt" min="0.0" max="1.0" step="0.01" value="0.40">
                        </div>

                    </div>
                </div>
                
                <div class="atlas-sp-actions">
                    <div class="atlas-sp-btn-wrap">
                        <button class="atlas-sp-btn atlas-sp-btn--reset" id="collapse-btn">
                            <span class="atlas-sp-btn__icon">⤌</span> Collapse Panel
                        </button>
                    </div>
                </div>
            </div>

            <div class="atlas-shader-panel__footer">
                <div class="atlas-shader-panel__footer-col">
                    <div class="atlas-sp-meta-line"><span class="atlas-sp-meta-key">SRC:</span>LimbDarkening.ush</div>
                </div>
                <div class="atlas-shader-panel__footer-col atlas-shader-panel__footer-col--right">
                    <div class="atlas-sp-meta-line"><span class="atlas-sp-meta-key">ENV:</span>UE 5.7</div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, mesh, material;

        const _VS = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const _FS = `
            precision highp float;
            uniform float coronaInt;
            varying vec2 vUv;

            float limbClaret(float mu) {
                float sqmu = sqrt(max(mu, 0.0));
                return clamp(1.0 
                    - 0.4361 * (1.0 - sqmu) 
                    - 0.2860 * (1.0 - mu) 
                    - 0.1567 * (1.0 - mu * sqmu) 
                    + 0.0885 * (1.0 - mu * mu), 
                    0.0, 1.0);
            }

            void main() {
                vec2 p = (vUv - 0.5) * 2.0;
                
                float d = length(p);
                if (d > 1.0) { discard; }

                float mu = sqrt(1.0 - d * d);
                float limbMult = limbClaret(mu);
                vec3 baseColor = vec3(1.0, 0.6, 0.1);
                vec3 finalColor = baseColor * limbMult;

                float corona = pow(1.0 - mu, 8.0) * coronaInt;
                finalColor += vec3(1.0, 0.8, 0.4) * corona;

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.Camera(); 

            const canvasElement = document.getElementById('webgl-canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            
            // Защита от лагов: фиксируем разрешение без спама лишних пикселей
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Используем современный PlaneGeometry вместо устаревшего PlaneBufferGeometry
            const geometry = new THREE.PlaneGeometry(2, 2);
            
            material = new THREE.ShaderMaterial({
                uniforms: {
                    coronaInt: { value: 0.40 }
                },
                vertexShader: _VS,
                fragmentShader: _FS
            });

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize, false);
            setupUI();
            animate();
        }

        // Дебаунс ресайза для предотвращения тормозов GPU при разворачивании окна
        let resizeTimeout;
        function onWindowResize() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, 120);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function setupUI() {
            const el = document.getElementById('coronaInt');
            const display = document.getElementById('val-coronaInt');
            
            el.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                display.innerText = val.toFixed(2);
                material.uniforms.coronaInt.value = val;
            });

            // Логика переключения состояний панели
            const uiPanel = document.getElementById('ui-panel');
            const collapseBtn = document.getElementById('collapse-btn');
            const uiHeader = document.getElementById('ui-header');

            collapseBtn.addEventListener('click', () => {
                uiPanel.classList.add('is-collapsed');
            });

            uiHeader.addEventListener('click', () => {
                uiPanel.classList.remove('is-collapsed');
            });
        }

        init();
    </script>
</body>
</html>
